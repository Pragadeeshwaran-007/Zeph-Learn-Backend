# -------------------------------------------------------
# ZephLearn TEST configuration
# Uses H2 in-memory DB — NEVER touches the real Supabase DB
# -------------------------------------------------------

# H2 in-memory datasource
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# JWT — deterministic values for tests
jwt.secret=test_secret_key_for_unit_tests_32ch
jwt.expiration=3600000

# Google OAuth — non-empty client-id & client-secret required by Spring Security OAuth2 autoconfiguration
google.client-id=test-google-client-id.apps.googleusercontent.com
google.client-secret=test-google-client-secret

spring.security.oauth2.client.registration.google.client-id=test-google-client-id.apps.googleusercontent.com
spring.security.oauth2.client.registration.google.client-secret=test-google-client-secret
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost/login/oauth2/code/google

allowed.origins=http://localhost:5173
